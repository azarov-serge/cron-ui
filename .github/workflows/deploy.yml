name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'docs/**'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Copy build for GitHub Pages (root and docs)
        run: |
          cp dist/dev.html index.html
          rm -rf assets docs
          cp -r dist/assets assets
          mkdir -p docs
          cp dist/dev.html docs/index.html
          cp -r dist/assets docs/assets
          cp dist/favicon.svg favicon.svg 2>/dev/null || true
          cp dist/icons.svg icons.svg 2>/dev/null || true
          cp dist/favicon.svg docs/favicon.svg 2>/dev/null || true
          cp dist/icons.svg docs/icons.svg 2>/dev/null || true
          touch .nojekyll docs/.nojekyll

      - name: Commit and push production files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update GitHub Pages site'
          file_pattern: 'index.html assets/** docs/** favicon.svg icons.svg .nojekyll'
